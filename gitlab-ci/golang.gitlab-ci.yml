# ── CONFIG ──────────────────────────────────────────────────────────────────
variables:
  GO_VERSION: "1.21"
  BINARY_NAME: your-app
  IMAGE_NAME: $CI_REGISTRY_IMAGE
  CGO_ENABLED: "0"
  GOFLAGS: "-mod=readonly"
# ────────────────────────────────────────────────────────────────────────────

image: golang:${GO_VERSION}-alpine

stages:
  - lint
  - test
  - build
  - release

# Cache Go module download cache across jobs
cache:
  key:
    files:
      - go.sum
  paths:
    - .go-pkg-cache/
  policy: pull-push

before_script:
  - export GOPATH="$CI_PROJECT_DIR/.go-pkg-cache"
  - mkdir -p "$GOPATH"
  - go mod download
  - go mod verify

# ── Lint ──────────────────────────────────────────────────────────────────────
vet:
  stage: lint
  script:
    - go vet ./...
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

golangci-lint:
  stage: lint
  image: golangci/golangci-lint:latest
  before_script: []  # skip go mod download — golangci-lint handles it
  script:
    - golangci-lint run --timeout=5m --out-format=colored-line-number
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Test ──────────────────────────────────────────────────────────────────────
test:
  stage: test
  script:
    - apk add --no-cache gcc musl-dev  # needed for race detector
    - CGO_ENABLED=1 go test -race -coverprofile=coverage.out -covermode=atomic ./...
    - go tool cover -func=coverage.out | tail -1
    - go tool cover -html=coverage.out -o coverage.html
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.out
    paths:
      - coverage.html
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# ── Build ─────────────────────────────────────────────────────────────────────
build:linux:amd64:
  stage: build
  script:
    - |
      GOOS=linux GOARCH=amd64 go build \
        -ldflags="-s -w -X main.Version=${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}} -X main.Commit=${CI_COMMIT_SHORT_SHA}" \
        -o dist/${BINARY_NAME}-linux-amd64 \
        ./cmd/${BINARY_NAME}
  artifacts:
    paths:
      - dist/
    expire_in: 7 days
  needs: [test]
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

build:linux:arm64:
  stage: build
  script:
    - |
      GOOS=linux GOARCH=arm64 go build \
        -ldflags="-s -w -X main.Version=${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}} -X main.Commit=${CI_COMMIT_SHORT_SHA}" \
        -o dist/${BINARY_NAME}-linux-arm64 \
        ./cmd/${BINARY_NAME}
  artifacts:
    paths:
      - dist/
    expire_in: 7 days
  needs: [test]
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

docker:build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - |
      docker build \
        --build-arg VERSION="${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}" \
        --build-arg COMMIT="${CI_COMMIT_SHORT_SHA}" \
        --tag "${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}" \
        .
    - docker push "${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}"
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag "${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}" "${IMAGE_NAME}:${CI_COMMIT_TAG}"
        docker push "${IMAGE_NAME}:${CI_COMMIT_TAG}"
        docker tag "${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}" "${IMAGE_NAME}:latest"
        docker push "${IMAGE_NAME}:latest"
      fi
  needs: [test]
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# ── Release ───────────────────────────────────────────────────────────────────
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  before_script: []
  script:
    - echo "Creating release for ${CI_COMMIT_TAG}"
  release:
    name: "Release ${CI_COMMIT_TAG}"
    tag_name: "$CI_COMMIT_TAG"
    description: |
      ## ${CI_COMMIT_TAG}

      Released from commit ${CI_COMMIT_SHORT_SHA} on branch ${CI_COMMIT_BRANCH}.
    assets:
      links:
        - name: "${BINARY_NAME}-linux-amd64"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/${BINARY_NAME}-linux-amd64?job=build:linux:amd64"
        - name: "${BINARY_NAME}-linux-arm64"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/${BINARY_NAME}-linux-arm64?job=build:linux:arm64"
  needs:
    - build:linux:amd64
    - build:linux:arm64
  rules:
    - if: $CI_COMMIT_TAG
